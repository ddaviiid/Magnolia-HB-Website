<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <g id="petal">
      <!-- Teardrop petal pointing upward from center -->
      <path d="M60,60 C54,42 50,18 60,8 C70,18 66,42 60,60Z"/>
    </g>
  </defs>

  <!-- 6 petals, rotated evenly -->
  <use href="#petal" fill="#F8F4EE" opacity="0.95" transform="rotate(0, 60, 60)"/>
  <use href="#petal" fill="#F8F4EE" opacity="0.80" transform="rotate(60, 60, 60)"/>
  <use href="#petal" fill="#F8F4EE" opacity="0.90" transform="rotate(120, 60, 60)"/>
  <use href="#petal" fill="#F8F4EE" opacity="0.75" transform="rotate(180, 60, 60)"/>
  <use href="#petal" fill="#F8F4EE" opacity="0.88" transform="rotate(240, 60, 60)"/>
  <use href="#petal" fill="#F8F4EE" opacity="0.70" transform="rotate(300, 60, 60)"/>

  <!-- Stamen center -->
  <circle cx="60" cy="60" r="7" fill="#C9A84C" opacity="0.9"/>
  <circle cx="60" cy="60" r="4" fill="#E0C068" opacity="1"/>
</svg>
